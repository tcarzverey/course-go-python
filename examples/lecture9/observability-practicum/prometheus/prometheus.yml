global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # OTel Collector exposes all service metrics in Prometheus format.
  # url-shortener and stats-service push metrics via OTLP → Collector → here.
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
