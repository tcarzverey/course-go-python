apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus_uid
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      timeInterval: "15s"

  - name: Loki
    type: loki
    uid: loki_uid
    access: proxy
    url: http://loki:3100
    jsonData:
      derivedFields:
        # trace_id comes as a Loki label (OTel structured metadata), not in the log body
        - matcherType: label
          matcherRegex: trace_id
          name: TraceID
          url: "$${__value.raw}"
          datasourceUid: tempo_uid
          urlDisplayLabel: "View Trace in Tempo"

  - name: Tempo
    type: tempo
    uid: tempo_uid
    access: proxy
    url: http://tempo:3200
    jsonData:
      serviceMap:
        datasourceUid: prometheus_uid
      nodeGraph:
        enabled: true
      lokiSearch:
        datasourceUid: loki_uid
